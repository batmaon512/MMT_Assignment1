<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AsynapRous Chat — Hybrid P2P</title>
  <meta name="description" content="Hybrid P2P Chat Application built on AsynapRous framework">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="app-logo">⬡</span>
      <span class="app-name">AsynapRous</span>
    </div>
    <div class="topbar-right">
      <span class="top-user" id="topUser">Connecting...</span>
      <button id="logoutBtn" class="btn-icon" title="Logout">⏻</button>
    </div>
  </div>

  <div class="app">

    <!-- Left Sidebar: Online Peers -->
    <div class="sidebar">
      <aside class="panel online-panel">
        <div class="header">
          <span>Online Peers</span>
          <span class="badge" id="onlineCount">0</span>
        </div>
        <div id="onlineList" class="online-list"></div>

        <!-- Create Channel Panel (shown when ≥1 user selected) -->
        <div id="createChannelPanel" class="create-channel-panel hidden">
          <div class="cc-title">
            <span id="selectedCount">0</span> peer(s) selected
          </div>
          <input type="text" id="channelNameInput" class="cc-input"
                 placeholder="Channel name (optional)" maxlength="40" />

          <!-- Public / Private toggle -->
          <div class="access-toggle">
            <label class="toggle-option">
              <input type="radio" name="channelAccess" value="public" id="accessPublic" checked>
              <span>🌐 Public</span>
            </label>
            <label class="toggle-option">
              <input type="radio" name="channelAccess" value="private" id="accessPrivate">
              <span>🔒 Private</span>
            </label>
          </div>

          <input type="password" id="channelPassword" class="cc-input hidden"
                 placeholder="Set password..." maxlength="64" />

          <div class="cc-actions">
            <button id="channelBtn" class="btn primary">＋ Create Channel</button>
            <button id="clearSelBtn" class="btn ghost">Clear</button>
          </div>
        </div>
      </aside>
    </div>

    <!-- Channel List -->
    <aside class="panel chats" role="navigation" aria-label="Channels">
      <div class="header">
        <div class="title">Channels</div>
        <span class="badge" id="channelCount">0</span>
      </div>
      <div class="chat-list" id="chatList"></div>
    </aside>

    <!-- Messages -->
    <section class="panel messages" role="main" aria-label="Messages">
      <div class="msg-header" id="msgHeader">
        <div class="msg-header-left">
          <div class="title" id="channelTitle">Select a channel</div>
          <div class="channel-members" id="channelMembers"></div>
        </div>
        <div class="msg-header-right">
          <button id="addMemberBtn" class="btn-add-member hidden" title="Add member to channel">＋ Add</button>
          <div class="connection-status" id="connectionStatus">
            <span class="dot offline"></span> Tracker
          </div>
        </div>
      </div>

      <div class="conversation" id="conversation">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">💬</div>
          <div>Select a channel or create one by clicking a peer on the left</div>
        </div>
      </div>

      <div class="composer">
        <textarea id="composer" placeholder="Write a message… (Enter to send, Shift+Enter for newline)"
                  rows="1"></textarea>
        <button id="sendBtn" class="btn send-btn" title="Send message">➤</button>
      </div>
    </section>

  </div>

  <!-- Modal: Password prompt (for joining private channel) -->
  <div id="passwordModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-icon">🔒</div>
      <h3 class="modal-title" id="passwordModalTitle">Private Channel</h3>
      <p class="modal-desc" id="passwordModalDesc">Enter password to join this channel:</p>
      <input type="password" id="passwordModalInput" class="cc-input"
             placeholder="Password..." autocomplete="off" />
      <div class="cc-actions" style="margin-top: 10px;">
        <button id="passwordModalOk" class="btn primary">Join</button>
        <button id="passwordModalCancel" class="btn ghost">Decline</button>
      </div>
    </div>
  </div>

  <!-- Modal: Add Member -->
  <div id="addMemberModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-icon">👥</div>
      <h3 class="modal-title">Add Member</h3>
      <p class="modal-desc">Select online peers to invite:</p>
      <div id="addMemberList" class="add-member-list"></div>
      <div class="cc-actions" style="margin-top: 10px;">
        <button id="addMemberOk" class="btn primary">Send Invite</button>
        <button id="addMemberCancel" class="btn ghost">Cancel</button>
      </div>
    </div>
  </div>

  <div id="notifyBox" class="notify-container"></div>
  <script src="js/index.js"></script>
</body>
</html>
