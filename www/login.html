<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to AsynapRous</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); color: white;
        }
        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 3rem; width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        h2 { font-size: 2rem; margin-bottom: 2rem; }
        .input-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; font-size: 0.9rem; color: #cbd5e1; margin-bottom: 0.5rem; }
        input {
            width: 100%; padding: 0.8rem 1rem; border-radius: 10px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            color: white; outline: none; transition: all 0.3s;
        }
        input:focus { border-color: #a78bfa; background: rgba(255,255,255,0.1); }
        button {
            width: 100%; padding: 1rem; border-radius: 10px; font-weight: 600; font-size: 1rem;
            background: linear-gradient(to right, #6366f1, #ec4899); border: none;
            color: white; cursor: pointer; transition: transform 0.2s;
        }
        button:hover { transform: scale(1.02); }
        #error-msg { color: #fb7185; font-size: 0.9rem; margin-top: 1rem; min-height: 20px; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2>Sign In</h2>
        <form id="loginForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" required placeholder="admin">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="123456">
            </div>
            <button type="submit">Enter</button>
            <div id="error-msg"></div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');
            
            // Build Basic Auth header
            const base64 = btoa(u + ":" + p);
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Authorization': 'Basic ' + base64 }
                });
                const data = await res.json();
                
                if (data.success) {
                    window.location.href = '/index.html';
                } else {
                    errorDiv.innerText = data.error || "Invalid username or password.";
                }
            } catch (err) {
                errorDiv.innerText = "Server connection error.";
            }
        });
    </script>
</body>
</html>
